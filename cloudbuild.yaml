# Optional CI/CD: build both images and deploy to Cloud Run.
# Trigger on push, or run manually:
#   gcloud builds submit --config cloudbuild.yaml \
#     --substitutions=_REGION=asia-south1,_REPO=smart-scheduler
substitutions:
  _REGION: asia-south1
  _REPO: smart-scheduler

steps:
  # ── Agent worker ─────────────────────────────────────────────
  - id: build-agent
    name: gcr.io/cloud-builders/docker
    args: ["build", "-t", "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/agent:$SHORT_SHA", "./agent"]
  - id: push-agent
    name: gcr.io/cloud-builders/docker
    args: ["push", "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/agent:$SHORT_SHA"]
  - id: deploy-agent
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - smart-scheduler-agent
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/agent:$SHORT_SHA
      - --region=${_REGION}
      - --min-instances=1
      - --no-cpu-throttling
      - --cpu=2
      - --memory=2Gi
      - --no-allow-unauthenticated
      - --service-account=scheduler-run@$PROJECT_ID.iam.gserviceaccount.com
      - --set-env-vars=GOOGLE_APPLICATION_CREDENTIALS=/secrets/gcal-sa.json,AGENT_TIMEZONE=Asia/Kolkata,LLM_PROVIDER=groq
      - --set-secrets=LIVEKIT_URL=livekit-url:latest,LIVEKIT_API_KEY=livekit-api-key:latest,LIVEKIT_API_SECRET=livekit-api-secret:latest,GROQ_API_KEY=groq-api-key:latest,GEMINI_API_KEY=gemini-api-key:latest,GCAL_CALENDAR_ID=gcal-calendar-id:latest,/secrets/gcal-sa.json=gcal-sa-json:latest

  # ── Web (public) ─────────────────────────────────────────────
  - id: build-web
    name: gcr.io/cloud-builders/docker
    args: ["build", "-t", "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/web:$SHORT_SHA", "./web"]
  - id: push-web
    name: gcr.io/cloud-builders/docker
    args: ["push", "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/web:$SHORT_SHA"]
  - id: deploy-web
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - smart-scheduler-web
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/web:$SHORT_SHA
      - --region=${_REGION}
      - --allow-unauthenticated
      - --set-secrets=LIVEKIT_URL=livekit-url:latest,LIVEKIT_API_KEY=livekit-api-key:latest,LIVEKIT_API_SECRET=livekit-api-secret:latest

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/agent:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/web:$SHORT_SHA
